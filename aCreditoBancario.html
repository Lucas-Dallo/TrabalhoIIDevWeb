<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Crédito Bancário</title>

    <link
        rel="stylesheet"
        href="style.css">
</head>

<body>

    <div class="caixa">

        <h2> Crédito Bancário</h2>
