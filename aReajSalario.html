<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reajuste de Salário</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="caixa">

        <header class="topo-salario">
            <h2>💰 Reajuste Salarial</h2>

            <img
                src="IMG\1240327.png"
                alt="Dinheiro"
                class="imagem-exercicio"
            >
        </header>

        <section class="regras">
            <p><strong>Percentuais de reajuste:</strong></p>

            <ul>
                <li>Código 101 → aumento de 10%</li>
                <li>Código 102 → aumento de 20%</li>
                <li>Código 103 → aumento de 30%</li>
                <li>Demais códigos → aumento de 40%</li>
            </ul>
        </section>

        <section class="dados-salario">
            <input
                type="number"
                id="salario"
                placeholder="Informe o salário atual"
            >

            <input
                type="number"
                id="cargo"
                placeholder="Digite o código do cargo"
            >

            <button onclick="calcularSalario()">
                Ver reajuste
            </button>
        </section>

        <section
            id="resultado"
            class="resultado">
        </section>

        <footer>
            <a href="index.html" class="voltar">
                ⬅ Retornar ao menu
            </a>
        </footer>

    </main>

    <script src="script.js"></script>

</body>
</html>
