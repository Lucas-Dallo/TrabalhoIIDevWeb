<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Salário</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="caixa">

        <header class="cabecalho">
            <h2> Pagamento de Professor</h2>

            <img
                src="IMG\90477.png"
                alt="Professor"
                class="imagem-exercicio"
            >
        </header>

        <section class="informacoes">
            <p><strong>Tabela de valores por hora:</strong></p>

            <p>Nível 1 → R$12,00 por aula</p>
            <p>Nível 2 → R$17,00 por aula</p>
            <p>Nível 3 → R$25,00 por aula</p>
        </section>

        <section class="dados">
            <input
                type="number"
                id="nivel"
                placeholder="Digite o nível"
            >

            <input
                type="number"
                id="aulas"
                placeholder="Quantidade de horas semanais"
            >

            <button onclick="calcularProfessor()">
                Consultar Salário
            </button>
        </section>

        <section
            id="resultado"
            class="resultado">
        </section>

        <footer>
            <a href="index.html" class="voltar">
                ⬅ Voltar ao início
            </a>
        </footer>

    </main>

    <script src="script.js"></script>

</body>
</html>
